[pytest]
testpaths =
    backend
    tests
pythonpath =
    backend
    .
norecursedirs =
    .git
    .venv
    .worktrees
    backend/node_modules
    frontend/node_modules
    frontend/dist
filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers

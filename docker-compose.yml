name: javhub

# Before first start:
#   cp config.yaml.example config.yaml
#   edit config.yaml secrets and external service URLs
#
# PostgreSQL is included for JavInfoApi metadata and JavHub state.
# If you already have PostgreSQL, you may comment out the postgres service and
# remove the postgres dependencies below. Create both the JavInfo metadata
# database (default "r18") and the JavHub state database (default "javhub"),
# then update DB_* and JAVHUB_DB_* values to match it.
#
# JavHub automatically asks JavInfoApi to apply its auxiliary migrations after
# a successful database import from the UI. There is no separate migration
# container in the normal deployment path.

x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB:-r18}
  POSTGRES_USER: ${POSTGRES_USER:-javhub}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
  JAVHUB_DB_NAME: ${JAVHUB_DB_NAME:-javhub}

x-javinfoapi-env: &javinfoapi-env
  APP_ENV: ${APP_ENV:-production}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-javhub}
  DB_PASSWORD: ${DB_PASSWORD:-change-me}
  DB_NAME: ${DB_NAME:-r18}
  DB_MAX_CONN: ${DB_MAX_CONN:-20}
  DB_MIN_CONN: ${DB_MIN_CONN:-5}
  SERVER_HOST: 0.0.0.0
  SERVER_PORT: 18080
  SUPPLEMENT_ADMIN_TOKEN: ${SUPPLEMENT_ADMIN_TOKEN:-change-me}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - javhub-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *postgres-env
    volumes:
      - javinfo-postgres:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  javinfoapi:
    image: ${JAVINFOAPI_IMAGE:-ghcr.io/kongmei-ovo/javinfoapi:stable}
    # For local development with a sibling checkout, replace the image line with:
    # build:
    #   context: ../JavInfoApi
    restart: unless-stopped
    environment:
      <<: *javinfoapi-env
    ports:
      - "${JAVINFOAPI_PORT:-18080}:18080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  javhub:
    image: ${JAVHUB_IMAGE:-ghcr.io/kongmei-ovo/javhub:stable}
    # For local development from this checkout, replace the image line with:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JAVHUB_CONFIG_PATH: /app/config.yaml
      JAVINFO_API_URL: ${JAVINFO_API_URL:-http://javinfoapi:18080}
      SUPPLEMENT_ADMIN_TOKEN: ${SUPPLEMENT_ADMIN_TOKEN:-change-me}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-javhub}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_NAME: ${DB_NAME:-r18}
      JAVHUB_DB_HOST: ${JAVHUB_DB_HOST:-postgres}
      JAVHUB_DB_PORT: ${JAVHUB_DB_PORT:-5432}
      JAVHUB_DB_USER: ${JAVHUB_DB_USER:-javhub}
      JAVHUB_DB_PASSWORD: ${JAVHUB_DB_PASSWORD:-change-me}
      JAVHUB_DB_NAME: ${JAVHUB_DB_NAME:-javhub}
      OPENLIST_USERNAME: ${OPENLIST_USERNAME:-}
      OPENLIST_PASSWORD: ${OPENLIST_PASSWORD:-}
      EMBY_API_URL: ${EMBY_API_URL:-}
      EMBY_API_KEY: ${EMBY_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      JAVHUB_CACHE_BACKEND: ${JAVHUB_CACHE_BACKEND:-redis}
      JAVHUB_REDIS_URL: ${JAVHUB_REDIS_URL:-redis://redis:6379/0}
      JAVHUB_REDIS_PREFIX: ${JAVHUB_REDIS_PREFIX:-javhub-cache}
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    ports:
      - "${JAVHUB_PORT:-3000}:80"
    depends_on:
      javinfoapi:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  javinfo-postgres:
  javhub-redis:

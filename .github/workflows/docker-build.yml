name: Build Docker Image

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kongmei-ovo/javhub

permissions:
  contents: read
  packages: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.calc.outputs.release }}
    steps:
      - name: Compute date-based release version
        id: calc
        # 日期版本(CalVer):YYYY.MM.DD + 当次构建序号,与本地 package.json 的日期版本
        # 同体系;run_number 保证同一天多次构建的镜像 tag 仍唯一。推 v* 标签时用标签名。
        # 用 Asia/Shanghai 取日期,贴合本地直觉(GitHub runner 默认 UTC)。
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release="${GITHUB_REF_NAME#v}"
          else
            release="$(TZ='Asia/Shanghai' date +'%Y.%m.%d').${GITHUB_RUN_NUMBER}"
          fi
          echo "release=${release}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${release}"

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: version
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.release }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v7
        env:
          VITE_APP_VERSION: ${{ env.RELEASE_VERSION }}
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
          build-args: |
            VITE_APP_VERSION=${{ env.RELEASE_VERSION }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  publish:
    name: Publish manifests
    needs: [version, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.release }}

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker tags
        run: |
          set -euo pipefail

          images=(
            "${IMAGE_NAME}:main"
            "${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
          )

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            images+=(
              "${IMAGE_NAME}:stable"
              "${IMAGE_NAME}:latest"
              "${IMAGE_NAME}:${RELEASE_VERSION}"
            )
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            images+=("${IMAGE_NAME}:${tag}")
            images+=("${IMAGE_NAME}:${tag#v}")
          fi

          sources=(
            "${IMAGE_NAME}:sha-${GITHUB_SHA}-amd64"
            "${IMAGE_NAME}:sha-${GITHUB_SHA}-arm64"
          )

          for image in "${images[@]}"; do
            docker buildx imagetools create \
              --tag "${image}" \
              "${sources[@]}"
          done

      - name: Summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- JavHub: \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Stable: \`${{ env.IMAGE_NAME }}:stable\`" >> $GITHUB_STEP_SUMMARY
          echo "- Release: \`${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}\`" >> $GITHUB_STEP_SUMMARY

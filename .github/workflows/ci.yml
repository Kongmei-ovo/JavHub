name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: javhub
          POSTGRES_PASSWORD: javhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U javhub -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JAVHUB_TEST_DB_HOST: localhost
      JAVHUB_TEST_DB_PORT: "5432"
      JAVHUB_TEST_DB_USER: javhub
      JAVHUB_TEST_DB_PASSWORD: javhub
      JAVHUB_TEST_DB_MAINTENANCE_DATABASE: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # horizontalOverflow.test.js drives a real chromium against the running
      # dev server; pull just the chromium binary + the linux system libs it
      # needs (fonts, libnss3, libasound2, etc) so Playwright can launch headless.
      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # 起 vite dev server 后台,horizontalOverflow 测试要 fetch http://127.0.0.1:5174
      # 才能拉真页面对比视口宽度。失败信息进 vite.log,方便 tail 看。
      - name: Start frontend dev server
        working-directory: frontend
        run: |
          nohup npm run dev > vite.log 2>&1 &
          echo $! > vite.pid

      - name: Wait for dev server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5174 > /dev/null; then
              echo "dev server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "dev server failed to start; vite.log:"
          cat frontend/vite.log || true
          exit 1

      - name: Run frontend tests
        working-directory: frontend
        run: npm test
        env:
          JAVHUB_FRONTEND_URL: http://127.0.0.1:5174

      - name: Stop frontend dev server
        if: always()
        working-directory: frontend
        run: |
          if [ -f vite.pid ]; then
            kill "$(cat vite.pid)" 2>/dev/null || true
            rm -f vite.pid
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

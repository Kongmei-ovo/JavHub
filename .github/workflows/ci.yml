name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: javhub
          POSTGRES_PASSWORD: javhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U javhub -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JAVHUB_TEST_DB_HOST: localhost
      JAVHUB_TEST_DB_PORT: "5432"
      JAVHUB_TEST_DB_USER: javhub
      JAVHUB_TEST_DB_PASSWORD: javhub
      JAVHUB_TEST_DB_MAINTENANCE_DATABASE: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    groups:
      backend-python-minor-patch:
        patterns:
          - beautifulsoup4
          - lxml
          - apscheduler
          - pyyaml
          - psycopg2-binary
          - python-multipart
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:10"
      timezone: Asia/Shanghai
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:20"
      timezone: Asia/Shanghai
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

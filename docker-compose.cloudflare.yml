services:
  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-latest}
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      javhub:
        condition: service_started
    networks:
      - default
